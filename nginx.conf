server {
    listen 80;
    server_name reva-web.imrtechsolutions.com revaprocess.in www.revaprocess.in;

    # SEO Redirect: Force non-WWW and HTTPS in production (documented template)
    # if ($host = 'www.revaprocess.in') {
    #     return 301 https://revaprocess.in$request_uri;
    # }
    # if ($scheme = 'http') {
    #     return 301 https://revaprocess.in$request_uri;
    # }

    # Allow large file uploads (hero videos up to 100MB)
    client_max_body_size 100M;

    # SEO 301 Redirect: Preserve legacy mixed-cased URLs and backlinks
    location = /services/BasicEngineering {
        return 301 /services/basic-engineering;
    }

    # Frontend Static Files
    location / {
        root /var/www/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API Backend Proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeout for file uploads (hero videos up to 100MB)
        client_max_body_size 100M;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # Explicitly handle static images from the backend
    location /api/uploads/ {
        proxy_pass http://127.0.0.1:8000/api/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
